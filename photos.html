    <style>
        /* ── Photography page ── */
        a.nav-brand { color: var(--ink); text-decoration: none; }
        a.nav-brand:hover { color: var(--ink); text-decoration: none; }

        #menu .nav-current { color: var(--accent); }

        .page-hero {
            padding: calc(var(--nav-h) + 64px) 5% 48px;
            max-width: var(--max-w);
            margin: 0 auto;
        }
        .page-hero h1 {
            font-family: var(--ff-display);
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -.03em;
            color: var(--ink);
            margin-bottom: .5rem;
            line-height: 1.1;
        }
        .page-hero p {
            color: var(--ink-2);
            font-size: 1.05rem;
        }

        /* ── Masonry grid ── */
        .gallery-wrap {
            padding: 0 5% 80px;
        }
        .masonry-grid {
            columns: 3 260px;
            column-gap: 10px;
        }
        .photo-item {
            break-inside: avoid;
            margin-bottom: 10px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .photo-item[data-src] { cursor: pointer; }

        .photo-item img {
            width: 100%;
            display: block;
            transition: transform .4s ease;
        }
        .photo-item[data-src]:hover img { transform: scale(1.03); }

        /* Placeholder tile */
        .photo-ph {
            width: 100%;
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--border);
            font-size: 1.6rem;
        }
        .photo-ph::after { content: '\f030'; font-family: FontAwesome; }

        /* Aspect ratio helpers for placeholders */
        .r-portrait  { aspect-ratio: 2/3; }
        .r-landscape { aspect-ratio: 4/3; }
        .r-square    { aspect-ratio: 1/1; }
        .r-tall      { aspect-ratio: 9/16; }

        /* Caption overlay */
        .photo-item figcaption {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 28px 14px 12px;
            background: linear-gradient(transparent, rgba(0,0,0,.6));
            color: #fff;
            font-size: .8rem;
            font-family: var(--ff-display);
            font-weight: 500;
            opacity: 0;
            transition: opacity .25s;
        }
        .photo-item[data-src]:hover figcaption { opacity: 1; }

        /* ── Lightbox ── */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.92);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .22s;
        }
        #lightbox.open {
            opacity: 1;
            pointer-events: all;
        }
        #lb-img-wrap {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #lb-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
        }
        #lb-caption {
            color: rgba(255,255,255,.65);
            font-size: .85rem;
            font-family: var(--ff-display);
            margin-top: 10px;
            min-height: 1.2em;
        }
        #lb-close, #lb-prev, #lb-next {
            position: fixed;
            background: none;
            border: 1px solid rgba(255,255,255,.3);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .2s;
            border-radius: 50%;
        }
        #lb-close:hover, #lb-prev:hover, #lb-next:hover { border-color: #fff; }

        #lb-close { top: 20px; right: 20px; width: 36px; height: 36px; font-size: 1.4rem; line-height: 1; }
        #lb-prev  { top: 50%; left: 16px;  transform: translateY(-50%); width: 44px; height: 44px; font-size: 1.8rem; }
        #lb-next  { top: 50%; right: 16px; transform: translateY(-50%); width: 44px; height: 44px; font-size: 1.8rem; }

        @media (max-width: 600px) {
            .masonry-grid { columns: 2 140px; }
            #lb-prev, #lb-next { display: none; }
        }
    </style>
</head>

    <script>
    // ── Theme (same as index.html) ──
    function setTheme(mode) {
        if (mode === 'auto') {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            localStorage.setItem('theme', 'auto');
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('theme');
        if (!saved || saved === 'auto') setTheme('auto');
        document.getElementById('current-year').textContent = new Date().getFullYear();
    });

    window.addEventListener('scroll', () => {
        document.querySelector('header').classList.toggle('sticky', window.scrollY > 60);
    });

    document.querySelector('.js-set-theme-auto')?.addEventListener('click', e => {
        e.preventDefault();
        setTheme('auto');
    });

    // ── Lightbox ──
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbCap    = document.getElementById('lb-caption');
    const items    = Array.from(document.querySelectorAll('.photo-item[data-src]'));
    let current    = 0;

    function openLightbox(index) {
        current = index;
        const item = items[index];
        lbImg.src = item.dataset.src;
        lbImg.alt = item.dataset.caption || '';
        lbCap.textContent = item.dataset.caption || '';
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        lbImg.src = '';
    }

    function navigate(dir) {
        current = (current + dir + items.length) % items.length;
        openLightbox(current);
    }

    items.forEach((fig, idx) => {
        fig.addEventListener('click', () => openLightbox(idx));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('lb-next').addEventListener('click', () => navigate(1));

    lightbox.addEventListener('click', e => {
        if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape')      closeLightbox();
        if (e.key === 'ArrowLeft')   navigate(-1);
        if (e.key === 'ArrowRight')  navigate(1);
    });
    </script>
